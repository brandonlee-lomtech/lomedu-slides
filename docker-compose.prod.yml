# Production: static Vite build served by nginx.
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-lomedu-slides}:prod
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-3010}:80"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
