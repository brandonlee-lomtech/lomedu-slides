<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="svgTitle svgDesc">
  <title id="svgTitle">Generative AI vs Agentic AI - popular tools</title>
  <desc id="svgDesc">
    Two columns: Generative AI lists chat, image, and assist tools; Agentic AI lists coding agents and goal-driven assistants.
  </desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#151d26"/>
    </linearGradient>
    <linearGradient id="genAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a9d8f"/>
      <stop offset="100%" stop-color="#3dd6c6"/>
    </linearGradient>
    <linearGradient id="agentAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c77d3a"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <ellipse cx="300" cy="320" rx="280" ry="220" fill="#3dd6c6" fill-opacity="0.06"/>
  <ellipse cx="900" cy="320" rx="280" ry="220" fill="#f4a261" fill-opacity="0.06"/>

  <rect x="48" y="48" width="528" height="544" rx="20" fill="#1a222d" stroke="#2a3d44" stroke-width="1" filter="url(#shadow)"/>
  <rect x="48" y="48" width="528" height="8" rx="20" fill="url(#genAccent)"/>
  <text x="72" y="118" fill="#e8eef4" font-family="system-ui, Segoe UI, sans-serif" font-size="28" font-weight="700">Generative AI</text>
  <text x="72" y="152" fill="#9aacbc" font-family="system-ui, Segoe UI, sans-serif" font-size="15">Creates content from your prompt - one turn at a time</text>

  <text x="72" y="200" fill="#3dd6c6" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em">CHAT &amp; TEXT</text>
  <g font-family="system-ui, Segoe UI, sans-serif" font-size="14" fill="#e8eef4">
    <rect x="72" y="212" rx="8" width="112" height="34" fill="#243038"/>
    <text x="92" y="235">ChatGPT</text>
    <rect x="196" y="212" rx="8" width="88" height="34" fill="#243038"/>
    <text x="216" y="235">Claude</text>
    <rect x="296" y="212" rx="8" width="96" height="34" fill="#243038"/>
    <text x="316" y="235">Gemini</text>
    <rect x="404" y="212" rx="8" width="88" height="34" fill="#243038"/>
    <text x="424" y="235">Copilot</text>
  </g>

  <text x="72" y="288" fill="#3dd6c6" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em">IMAGES &amp; MEDIA</text>
  <g font-family="system-ui, Segoe UI, sans-serif" font-size="14" fill="#e8eef4">
    <rect x="72" y="300" rx="8" width="120" height="34" fill="#243038"/>
    <text x="92" y="323">Midjourney</text>
    <rect x="204" y="300" rx="8" width="100" height="34" fill="#243038"/>
    <text x="224" y="323">DALL-E 3</text>
    <rect x="316" y="300" rx="8" width="72" height="34" fill="#243038"/>
    <text x="336" y="323">SDXL</text>
    <rect x="400" y="300" rx="8" width="140" height="34" fill="#243038"/>
    <text x="420" y="323">Adobe Firefly</text>
  </g>

  <text x="72" y="376" fill="#3dd6c6" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em">IN YOUR WORKFLOW</text>
  <text x="72" y="408" fill="#9aacbc" font-family="system-ui, Segoe UI, sans-serif" font-size="14">
    <tspan x="72" dy="0">You ask - the model returns a draft, image, or snippet.</tspan>
    <tspan x="72" dy="22">You stay in the loop for every next step.</tspan>
  </text>

  <rect x="624" y="48" width="528" height="544" rx="20" fill="#1a222d" stroke="#2a3d44" stroke-width="1" filter="url(#shadow)"/>
  <rect x="624" y="48" width="528" height="8" rx="20" fill="url(#agentAccent)"/>
  <text x="648" y="118" fill="#e8eef4" font-family="system-ui, Segoe UI, sans-serif" font-size="28" font-weight="700">Agentic AI</text>
  <text x="648" y="152" fill="#9aacbc" font-family="system-ui, Segoe UI, sans-serif" font-size="15">Plans and chains actions toward a goal - tools &amp; checkpoints</text>

  <text x="648" y="200" fill="#f4a261" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em">CODING &amp; REPOS</text>
  <g font-family="system-ui, Segoe UI, sans-serif" font-size="14" fill="#e8eef4">
    <rect x="648" y="212" rx="8" width="88" height="34" fill="#2e2820"/>
    <text x="668" y="235">Cursor</text>
    <rect x="748" y="212" rx="8" width="108" height="34" fill="#2e2820"/>
    <text x="768" y="235">Windsurf</text>
    <rect x="868" y="212" rx="8" width="96" height="34" fill="#2e2820"/>
    <text x="888" y="235">Codex CLI</text>
    <rect x="976" y="212" rx="8" width="164" height="34" fill="#2e2820"/>
    <text x="992" y="235">Copilot agent mode</text>
  </g>

  <text x="648" y="288" fill="#f4a261" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em">ORCHESTRATION</text>
  <g font-family="system-ui, Segoe UI, sans-serif" font-size="14" fill="#e8eef4">
    <rect x="648" y="300" rx="8" width="96" height="34" fill="#2e2820"/>
    <text x="668" y="323">Jules</text>
    <rect x="756" y="300" rx="8" width="88" height="34" fill="#2e2820"/>
    <text x="776" y="323">Devin</text>
    <rect x="856" y="300" rx="8" width="124" height="34" fill="#2e2820"/>
    <text x="876" y="323">Custom agents</text>
  </g>

  <text x="648" y="376" fill="#f4a261" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em">IN YOUR WORKFLOW</text>
  <text x="648" y="408" fill="#9aacbc" font-family="system-ui, Segoe UI, sans-serif" font-size="14">
    <tspan x="648" dy="0">You set a goal - the system edits files, runs commands,</tspan>
    <tspan x="648" dy="22">or chains lookups until done (within limits you set).</tspan>
  </text>

  <circle cx="600" cy="320" r="44" fill="#0f1419" stroke="#3d4a55" stroke-width="2"/>
  <text x="600" y="308" text-anchor="middle" fill="#9aacbc" font-family="system-ui, Segoe UI, sans-serif" font-size="11" font-weight="600">REAL</text>
  <text x="600" y="326" text-anchor="middle" fill="#9aacbc" font-family="system-ui, Segoe UI, sans-serif" font-size="11" font-weight="600">PRODUCTS</text>
  <text x="600" y="344" text-anchor="middle" fill="#6d7d8c" font-family="system-ui, Segoe UI, sans-serif" font-size="10">often blend both</text>

  <text x="600" y="612" text-anchor="middle" fill="#6d7d8c" font-family="system-ui, Segoe UI, sans-serif" font-size="12">Names for orientation - not an endorsement or exhaustive list.</text>
</svg>
